<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Wisdom - Random Food</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="main-card">
        
        <header class="header-section">
            <h1>คิดไม่ออก... <span class="highlight">กินอะไรดี?</span> 🍜</h1>
        </header>

        <section class="wheel-section">
            <div class="wheel-outer">
                <div class="wheel-pointer"></div>
                <div class="wheel-inner">
                    <p id="result-text">กดปุ่มเพื่อสุ่มอาหาร</p>
                </div>
            </div>
        </section>

        <section class="action-section">
            <button id="spin-btn" class="btn-gradient">สุ่มเมนูเลย! ✨</button>
        </section>

        <section class="suggested-section">
            <h2>รายการอาหาร</h2>
            
            <div class="food-grid">
                <div class="food-item">
                    <span class="food-emoji">🍳</span>
                    <p>กระเพราหมูกรอบ</p>
                </div>
                <div class="food-item">
                    <span class="food-emoji">🍣</span>
                    <p>ซูชิ</p>
                </div>
                <div class="food-item">
                    <span class="food-emoji">🍜</span>
                    <p>ผัดไทย</p>
                </div>
                <div class="food-item">
                    <span class="food-emoji">🍲</span>
                    <p>ชาบู</p>
                </div>
                <div class="food-item">
                    <span class="food-emoji">🥗</span>
                    <p>สลัดผัก</p>
                </div>
                <div class="food-item">
                    <span class="food-emoji">🍛</span>
                    <p>แกงกะหรี่</p>
                </div>
                <div class="food-item">
                    <span class="food-emoji">🍕</span>
                    <p>พิซซ่า</p>
                </div>
                <div class="food-item">
                    <span class="food-emoji">🍗</span>
                    <p>ไก่ทอด</p>
                </div>
            </div>
        </section>

    </main>

    <script src="as.js"></script>
</body>
</html>
